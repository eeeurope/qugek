<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wordroots - qugek lievest</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container" class="hide-right">
        <div id="left-column">
            <div id="buttonz">
                <button id="toggle-btn" class="bbttnn">show list</button>
                <button class="bbttnn" onclick="window.location.href='index.html'">back</button>
            </div>
            <h2 id="root">pick a wordroot in the list</h2>
            <p id="meaning"></p>
            <img id="image" src="" alt="" style="max-width: 200px; display: none;">
            <p id="pronunciation" class="monoed"></p>
            <p id="etymology"></p>
        </div>
        
        <div id="right-column">
            <button id="toggle-hbtn" class="hidebtn">hide</button>
            <input type="text" id="search" class="edittext" placeholder="search root, meaning...">
            <label style="font-size: 18px; border-bottom: 1px solid #222; display: inline-flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="ahcb" checked> auto-hide
            </label>
            <ul id="root-list"></ul>
        </div>
    </div>

    <script>
        let rootsData = [];

        const tbtn = document.getElementById('toggle-btn');
        const thBtn = document.getElementById('toggle-hbtn');
        const container = document.getElementById('container');
        const checkbox = document.getElementById('ahcb');
        const searchInput = document.getElementById('search');
        const list = document.getElementById("root-list");

        function toggleSidebar(forceState) {
            const isHidden = typeof forceState === 'boolean' 
                ? container.classList.toggle('hide-right', forceState)
                : container.classList.toggle('hide-right');
            
            tbtn.textContent = isHidden ? 'show list' : 'hide list';
        }

        [tbtn, thBtn].forEach(btn => btn.addEventListener('click', () => toggleSidebar()));

        fetch("roots.json")
            .then(res => res.json())
            .then(roots => {
                rootsData = roots.sort((a, b) => a.root.localeCompare(b.root));
                renderRootList(rootsData);

                const rootParam = new URLSearchParams(window.location.search).get("root");
                if (rootParam) showRootDetails(rootParam);
            })
            .catch(err => console.error("data loading failed:", err));

        function renderRootList(data) {
            list.innerHTML = data.map(item => `<li data-root="${item.root}">${item.root}</li>`).join('');
        }

        list.addEventListener('click', e => {
            const li = e.target.closest('li');
            if (!li) return;

            const rootVal = li.dataset.root;
            showRootDetails(rootVal);
            history.replaceState(null, "", "?root=" + rootVal);

            if (checkbox.checked) {
                toggleSidebar(true);
            }
        });

        function showRootDetails(root) {
            const item = rootsData.find(r => r.root === root);
            if (!item) return;
            
            document.getElementById("root").textContent = item.root;
            document.getElementById("meaning").textContent = item.meaning;
            
            const img = document.getElementById("image");
            img.src = "images/" + item.root + ".png";
            img.alt = item.root;
            img.onload = () => img.style.display = "block";
            img.onerror = () => img.style.display = "none";
            
            document.getElementById("pronunciation").textContent = item.pronunciation ? `[${item.pronunciation}]` : "";
            document.getElementById("etymology").textContent = item.etymology ? "etymology: " + item.etymology : "";
        }

        searchInput.addEventListener("input", e => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = rootsData.filter(r => 
                r.root.toLowerCase().includes(query) || 
                (r.meaning && r.meaning.toLowerCase().includes(query))
            );
            renderRootList(filtered);
        });
    </script>
</body>
</html>
